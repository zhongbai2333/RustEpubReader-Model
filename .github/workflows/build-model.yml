# Build Model — Export MacBERT4CSC to ONNX, quantize to INT8, publish Release
#
# Triggered by:
#   - Pushing a version tag (v*)
#   - Manual dispatch (with optional version override)

name: Build Model

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Model version (e.g. 1.0.0). Defaults to tag name."
        required: false
        type: string
      model_name:
        description: "HuggingFace model to export"
        required: false
        default: "shibing624/macbert4csc-base-chinese"
        type: string

permissions:
  contents: write  # For creating releases

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine model name
        id: model
        run: |
          MODEL="${{ inputs.model_name }}"
          if [ -z "$MODEL" ]; then
            MODEL="shibing624/macbert4csc-base-chinese"
          fi
          echo "name=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Export ONNX
        run: python scripts/export_onnx.py --model "${{ steps.model.outputs.name }}" --output output

      - name: Quantize to INT8
        run: python scripts/quantize.py --input output/macbert4csc.onnx --output output

      - name: Generate manifest
        run: python scripts/generate_manifest.py --output output --version "${{ steps.version.outputs.version }}"

      - name: Print SHA256
        run: |
          echo "## Model Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          sha256sum output/csc-macbert-int8.onnx output/csc-vocab.txt output/csc-manifest.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat output/csc-manifest.json >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: csc-model-${{ steps.version.outputs.version }}
          path: |
            output/csc-macbert-int8.onnx
            output/csc-vocab.txt
            output/csc-manifest.json

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: "CSC Model v${{ steps.version.outputs.version }}"
          body: |
            ## Chinese Spelling Correction Model v${{ steps.version.outputs.version }}

            Base model: `${{ steps.model.outputs.name }}`
            Quantization: Dynamic INT8

            ### Download

            | File | Description |
            |---|---|
            | `csc-macbert-int8.onnx` | Quantized ONNX model |
            | `csc-vocab.txt` | BERT WordPiece vocabulary |
            | `csc-manifest.json` | Version manifest with SHA256 checksums |

            ### CDN URLs (after sync)

            ```
            https://dl.zhongbai233.com/models/csc-macbert-int8.onnx
            https://dl.zhongbai233.com/models/csc-vocab.txt
            https://dl.zhongbai233.com/models/csc-manifest.json
            ```
          files: |
            output/csc-macbert-int8.onnx
            output/csc-vocab.txt
            output/csc-manifest.json
          draft: false
          prerelease: false
