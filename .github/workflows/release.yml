# Release — build the CSC ONNX model + cross-compile the inference plugin
# for every supported platform and publish them in a single GitHub Release.
#
# A single tag (e.g. `v0.1.0`) drives everything; the model and plugin
# versions are intentionally kept in lock-step so the CDN layout under
# `https://dl.zhongbai233.com/{models,plugins/v1}/...` stays consistent.
#
# Triggered by:
#   - Pushing a tag matching `v*`
#   - Manual dispatch (with optional version override)
#
# Per-platform plugin directory layout:
#   windows-x86_64-cpu       csc_plugin.dll
#   windows-x86_64-directml  csc_plugin.dll  (DirectML EP enabled)
#   windows-aarch64-cpu      csc_plugin.dll
#   linux-x86_64             libcsc_plugin.so
#   linux-aarch64            libcsc_plugin.so   (cross-compiled)
#   macos-x86_64             libcsc_plugin.dylib (cross-compiled on arm64 runner)
#   macos-aarch64            libcsc_plugin.dylib
#   android-arm64-v8a        libonnxruntime.so + libonnxruntime4j_jni.so
#   android-x86_64           libonnxruntime.so + libonnxruntime4j_jni.so

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0). Defaults to tag name."
        required: false
        type: string
      model_name:
        description: "HuggingFace model to export"
        required: false
        default: "shibing624/macbert4csc-base-chinese"
        type: string
      ort_android_version:
        description: "onnxruntime-android version to extract"
        required: false
        default: "1.24.3"
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  PLUGIN_DIR: plugins
  OUTPUT_ROOT: output/plugins/v1

jobs:
  # ---------------------------------------------------------------------
  # Resolve the version once so every downstream job uses the same value.
  # ---------------------------------------------------------------------
  setup:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      model_name: ${{ steps.model.outputs.name }}
      ort_android_version: ${{ steps.ort.outputs.version }}
    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine model name
        id: model
        shell: bash
        run: |
          MODEL="${{ inputs.model_name }}"
          if [ -z "$MODEL" ]; then MODEL="shibing624/macbert4csc-base-chinese"; fi
          echo "name=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Determine ORT (Android) version
        id: ort
        shell: bash
        run: |
          V="${{ inputs.ort_android_version }}"
          if [ -z "$V" ]; then V="1.24.3"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------
  # Export MacBERT4CSC → ONNX, quantize to INT8, emit manifest.
  # ---------------------------------------------------------------------
  build-model:
    name: Build model
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export ONNX
        run: python scripts/export_onnx.py --model "${{ needs.setup.outputs.model_name }}" --output output

      - name: Quantize to INT8
        run: python scripts/quantize.py --input output/macbert4csc.onnx --output output

      - name: Generate manifest
        run: python scripts/generate_manifest.py --output output --version "${{ needs.setup.outputs.version }}"

      - name: Print SHA256
        shell: bash
        run: |
          {
            echo "## Model Artifacts"
            echo ""
            echo '```'
            sha256sum output/csc-macbert-int8.onnx output/csc-vocab.txt output/csc-manifest.json
            echo '```'
            echo ""
            cat output/csc-manifest.json
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ needs.setup.outputs.version }}
          path: |
            output/csc-macbert-int8.onnx
            output/csc-vocab.txt
            output/csc-manifest.json
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Per-platform plugin builds (one matrix entry per output directory).
  # ---------------------------------------------------------------------
  build-plugin:
    name: plugin-${{ matrix.label }}
    needs: setup
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64-cpu
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
            artifact: csc_plugin.dll
          - label: windows-x86_64-directml
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            features: directml
            artifact: csc_plugin.dll
          - label: windows-aarch64-cpu
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            features: ""
            artifact: csc_plugin.dll
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
            artifact: libcsc_plugin.so
          - label: linux-aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            features: ""
            artifact: libcsc_plugin.so
            cross: true
          - label: macos-x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            features: ""
            artifact: libcsc_plugin.dylib
          - label: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            features: ""
            artifact: libcsc_plugin.dylib
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile linker (linux-aarch64)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross linker (linux-aarch64)
        if: matrix.cross == true
        shell: bash
        run: |
          mkdir -p ~/.cargo
          {
            echo "[target.aarch64-unknown-linux-gnu]"
            echo "linker = \"aarch64-linux-gnu-gcc\""
          } >> ~/.cargo/config.toml

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ env.PLUGIN_DIR }}/target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ matrix.features }}-${{ hashFiles(format('{0}/**/Cargo.toml', env.PLUGIN_DIR), format('{0}/**/Cargo.lock', env.PLUGIN_DIR)) }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-

      - name: Build plugin
        shell: bash
        working-directory: ${{ env.PLUGIN_DIR }}
        run: |
          set -euo pipefail
          FEATURES="${{ matrix.features }}"
          if [ -n "$FEATURES" ]; then
            cargo build --release -p csc-plugin --target ${{ matrix.target }} --features "$FEATURES"
          else
            cargo build --release -p csc-plugin --target ${{ matrix.target }}
          fi

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          DEST="${OUTPUT_ROOT}/${{ matrix.label }}"
          mkdir -p "$DEST"
          cp "${PLUGIN_DIR}/target/${{ matrix.target }}/release/${{ matrix.artifact }}" "$DEST/${{ matrix.artifact }}"
          ls -la "$DEST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.label }}
          path: ${{ env.OUTPUT_ROOT }}/${{ matrix.label }}/
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Android variant: download the official ORT AAR and extract only the
  # `.so` files we need. Much cheaper than building from source.
  # ---------------------------------------------------------------------
  extract-android-libs:
    name: plugin-android-extract
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run extractor
        run: |
          python scripts/extract_onnxruntime_android.py \
            --version "${{ needs.setup.outputs.ort_android_version }}" \
            --output "${OUTPUT_ROOT}"

      - name: Upload android-arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: plugin-android-arm64-v8a
          path: ${{ env.OUTPUT_ROOT }}/android-arm64-v8a/
          if-no-files-found: error

      - name: Upload android-x86_64
        uses: actions/upload-artifact@v4
        with:
          name: plugin-android-x86_64
          path: ${{ env.OUTPUT_ROOT }}/android-x86_64/
          if-no-files-found: error

  # ---------------------------------------------------------------------
  # Aggregate all artifacts and publish a single GitHub Release.
  # ---------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [setup, build-model, build-plugin, extract-android-libs]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          path: model-staging
          pattern: model-*
          merge-multiple: true

      - name: Download plugin artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.OUTPUT_ROOT }}
          pattern: plugin-*
          merge-multiple: false

      - name: Flatten plugin layout
        shell: bash
        run: |
          set -euo pipefail
          # download-artifact creates `plugin-<label>/<files>` — rename each
          # to the bare label so the final tree matches the CDN layout.
          cd "${OUTPUT_ROOT}"
          for d in plugin-*/; do
            label="${d#plugin-}"
            label="${label%/}"
            mv "$d" "$label"
          done
          find . -maxdepth 2 -type f | sort

      - name: Generate plugin manifests
        run: |
          python scripts/generate_plugin_manifest.py \
            --root "${OUTPUT_ROOT}" \
            --version "${{ needs.setup.outputs.version }}" \
            --abi 1

      - name: Pack per-platform tarballs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          DIST_ABS="$(cd dist && pwd)"
          cd "${OUTPUT_ROOT}"
          for label in */; do
            label="${label%/}"
            tar czf "${DIST_ABS}/csc-plugin-${{ needs.setup.outputs.version }}-${label}.tar.gz" "$label"
          done
          ls -la "${DIST_ABS}"

      - name: Stage model files for release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp model-staging/csc-macbert-int8.onnx dist/
          cp model-staging/csc-vocab.txt dist/
          cp model-staging/csc-manifest.json dist/
          ls -la dist

      - name: Print release summary
        shell: bash
        run: |
          {
            echo "## RustEpubReader Resources v${{ needs.setup.outputs.version }}"
            echo ""
            echo "### Plugin (ABI 1) tarballs"
            echo '```'
            ( cd dist && sha256sum csc-plugin-*.tar.gz )
            echo '```'
            echo ""
            echo "### Model files"
            echo '```'
            ( cd dist && sha256sum csc-macbert-int8.onnx csc-vocab.txt csc-manifest.json )
            echo '```'
            echo ""
            for m in "${OUTPUT_ROOT}"/*/csc-plugin-manifest.json; do
              echo "### plugin/$(basename "$(dirname "$m")")"
              echo '```json'
              cat "$m"; echo
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', needs.setup.outputs.version) }}
          name: "RustEpubReader Resources v${{ needs.setup.outputs.version }}"
          body: |
            # RustEpubReader Resources v${{ needs.setup.outputs.version }}

            Unified release of the Chinese spelling-correction model and the
            cross-platform inference plugin. The model and plugin versions
            are kept in lock-step so the CDN layout under
            `https://dl.zhongbai233.com/{models,plugins/v1}/...` stays
            consistent.

            ## Model

            Base model: `${{ needs.setup.outputs.model_name }}`
            Quantization: Dynamic INT8

            | File | Description |
            |---|---|
            | `csc-macbert-int8.onnx` | Quantized ONNX model |
            | `csc-vocab.txt` | BERT WordPiece vocabulary |
            | `csc-manifest.json` | Version manifest with SHA256 checksums |

            CDN URLs (after sync):

            ```
            https://dl.zhongbai233.com/models/csc-macbert-int8.onnx
            https://dl.zhongbai233.com/models/csc-vocab.txt
            https://dl.zhongbai233.com/models/csc-manifest.json
            ```

            ## Plugin (C ABI 1)

            Per-platform tarballs are layout-equivalent to
            `https://dl.zhongbai233.com/plugins/v1/<platform>/`.

            Each tarball contains the plugin shared library (or, for
            Android, the bundled ONNX Runtime native libs) plus a
            `csc-plugin-manifest.json` with SHA256 checksums for runtime
            verification.
          files: |
            dist/csc-macbert-int8.onnx
            dist/csc-vocab.txt
            dist/csc-manifest.json
            dist/csc-plugin-*.tar.gz
          draft: false
          prerelease: false
